name: preview-build

on:
  workflow_call:
    inputs:
      repo-name:
        description: owner/repo of the calling repository. Permanent metadata sent by the caller.
        required: true
        type: string
      deployment-url:
        description: Base URL of the calling repo's GitHub Pages site, no trailing slash (e.g. https://owner.github.io/repo).
        required: true
        type: string

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout PR code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.158.0'
          extended: true

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        env:
          BASE_URL: ${{ inputs.deployment-url }}/pr-preview/pr-${{ github.event.pull_request.number }}/
        run: |
          set -euo pipefail
          hugo \
            --cleanDestinationDir \
            --environment dev \
            --buildDrafts \
            --buildFuture \
            --buildExpired \
            --minify \
            --baseURL "$BASE_URL"

      - name: Upload preview artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-site
          path: public
          retention-days: 1
          if-no-files-found: error
