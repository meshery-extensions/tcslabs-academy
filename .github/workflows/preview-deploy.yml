name: preview-deploy

on:
  workflow_call:
    inputs:
      deployment-url:
        description: Base URL of the calling repo's GitHub Pages site, no trailing slash (e.g. https://owner.github.io/repo).
        required: true
        type: string

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Push the preview to gh-pages.
      pull-requests: write # Sticky preview-URL comment on the PR.
      actions: read # Download the artifact from the triggering run.
    steps:
      - name: Resolve pull request for this build
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_FULL: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BASE_BRANCH: master
        run: |
          set -euo pipefail
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "Invalid head SHA"; exit 1; }
          matches="$(gh api --paginate "repos/${GH_REPO_FULL}/pulls?state=open&per_page=100" \
            --jq '.[] | select(.head.sha == env.HEAD_SHA and .base.ref == env.BASE_BRANCH) | .number')"
          number="$(printf '%s\n' "$matches" | head -n1)"
          if [[ -z "$number" ]]; then
            echo "::notice::No open PR against ${BASE_BRANCH} has head ${HEAD_SHA}; build is stale or PR closed. Skipping deploy."
          fi
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Download preview artifact
        if: steps.pr.outputs.number != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: preview-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: ${{ runner.temp }}/preview-site

      - name: Artifact sanity checks
        if: steps.pr.outputs.number != ''
        env:
          SITE_DIR: ${{ runner.temp }}/preview-site
          MAX_SITE_MB: 200
        run: |
          set -euo pipefail
          test -f "${SITE_DIR}/index.html" || { echo "No index.html at artifact root"; exit 1; }
          if find "${SITE_DIR}" -type l | grep -q .; then
            echo "Removing symlinks smuggled into the artifact:"
            find "${SITE_DIR}" -type l -print -delete
          fi
          size_mb="$(du -sm "${SITE_DIR}" | cut -f1)"
          if (( size_mb > MAX_SITE_MB )); then
            echo "Artifact too large: ${size_mb}MB (limit ${MAX_SITE_MB}MB)"; exit 1
          fi

      - name: Checkout gh-pages
        if: steps.pr.outputs.number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          fetch-depth: 1
          sparse-checkout: pr-preview

      - name: Publish preview
        if: steps.pr.outputs.number != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          SITE_DIR: ${{ runner.temp }}/preview-site
        run: |
          set -euo pipefail
          [[ "$PR_NUMBER" =~ ^[0-9]+$ ]] || { echo "Invalid PR number"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          publish() {
            git fetch origin gh-pages
            git reset --hard origin/gh-pages
            target="pr-preview/pr-${PR_NUMBER}"
            rm -rf "$target"
            mkdir -p "$target"
            cp -r "${SITE_DIR}/." "$target/"
            git add -A pr-preview
            if git diff --cached --quiet; then
              echo "Preview unchanged; nothing to push."
              return 0
            fi
            git commit -m "deploy preview for PR #${PR_NUMBER}"
            git push origin gh-pages
          }

          for attempt in 1 2 3 4 5; do
            if publish; then exit 0; fi
            echo "Push rejected (attempt ${attempt}); retrying against new tip"
            sleep "$(( RANDOM % 4 + 1 ))"
          done
          echo "Failed to publish after 5 attempts"; exit 1

      - name: Comment preview URL
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          DEPLOYMENT_URL: ${{ inputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const url = `${process.env.DEPLOYMENT_URL}/pr-preview/pr-${prNumber}/`;
            const body = [
              `🚀 Preview: ${url}`,
              '',
              '> GitHub Pages may take a moment to publish — refresh if it 404s.',
              marker,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = [...comments].reverse().find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
