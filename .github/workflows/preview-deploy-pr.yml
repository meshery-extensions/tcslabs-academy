name: preview-deploy-pr

on:
  workflow_run:
    workflows: [preview-build-pr]
    types: [completed]

permissions: {}

concurrency:
  group: preview-deploy-pr-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
      actions: read
    # Local reference for now; point at the central repo once published:
    #   uses: <org>/<central-repo>/.github/workflows/preview-deploy.yml@<pinned-sha>
    uses: ./.github/workflows/preview-deploy.yml
    with:
      repo-name: ${{ github.repository }}
      deployment-url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      run_id: '${{ github.event.workflow_run.id }}'
      head_sha: ${{ github.event.workflow_run.head_sha }}
