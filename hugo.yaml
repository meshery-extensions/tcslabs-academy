baseURL: http://localhost:9876/academy/
title: Example Academy
canonifyurls: true
ignoreLogs: ['warning-goldmark-raw-html']

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  hugoVersion:
    extended: true
    min: 0.156.0
  imports:

    # used to source the base theme for academy.
    - path: github.com/layer5io/academy-theme
      disable: false

security:
  node:
    permissions:
      disable: true

