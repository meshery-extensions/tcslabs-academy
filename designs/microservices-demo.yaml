# TCS Labs Academy — Microservices demo application
#
# A small, realistic three-tier app used across the deployment and operations lessons:
#   frontend (nginx)  ->  api (podinfo)  ->  cache (redis)
#
# Valid Kubernetes YAML. Import into Meshery:
#   mesheryctl design import -f designs/microservices-demo.yaml -s "Kubernetes Manifest"
# ...or apply directly:
#   kubectl apply -f designs/microservices-demo.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: tcslabs-demo
  labels:
    app.kubernetes.io/part-of: tcslabs-academy
    academy.tcslabs/design: microservices-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: tcslabs-demo
  labels:
    app.kubernetes.io/part-of: tcslabs-academy
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        proxy_pass http://api:9898;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
      location /healthz { return 200 'ok'; add_header Content-Type text/plain; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tcslabs-demo
  labels:
    app: frontend
    app.kubernetes.io/part-of: tcslabs-academy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tcslabs-demo
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tcslabs-demo
  labels:
    app: api
    app.kubernetes.io/part-of: tcslabs-academy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.0
          command:
            - ./podinfo
            - --port=9898
            - --cache-server=tcp://redis:6379
          ports:
            - name: http
              containerPort: 9898
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tcslabs-demo
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 9898
      targetPort: 9898
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tcslabs-demo
  labels:
    app: redis
    app.kubernetes.io/part-of: tcslabs-academy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tcslabs-demo
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
