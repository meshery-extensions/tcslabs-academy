# TCS Labs Academy — Observability stack (Prometheus + Grafana)
#
# A minimal, education-focused observability stack used in the day-2 operations lessons.
# Prometheus scrapes in-cluster targets; Grafana visualizes them.
#
# Import into Meshery:
#   mesheryctl design import -f designs/observability-stack.yaml -s "Kubernetes Manifest"
# ...or apply directly:
#   kubectl apply -f designs/observability-stack.yaml
#
# NOTE: Education-focused. Grafana uses a demo admin password and emptyDir storage.
# Harden credentials, persistence, and RBAC before any production use.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tcslabs-observability
  labels:
    app.kubernetes.io/part-of: tcslabs-academy
    academy.tcslabs/design: observability-stack
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: tcslabs-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tcslabs-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tcslabs-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tcslabs-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: tcslabs-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: tcslabs-observability
  labels:
    app.kubernetes.io/part-of: tcslabs-academy
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: tcslabs-observability
  labels:
    app: prometheus
    app.kubernetes.io/part-of: tcslabs-academy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: tcslabs-observability
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: tcslabs-observability
  labels:
    app: grafana
    app.kubernetes.io/part-of: tcslabs-academy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            # Demo only. Use a Secret and a strong password in real environments.
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "academy-demo"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: tcslabs-observability
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
